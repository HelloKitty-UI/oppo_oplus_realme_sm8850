name: Xbox FF 独立驱动模块编译

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        type: choice
        default: '6.12.23'
        options:
          - '6.12.23'
          - '6.12.38'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binutils python3 flex bison bc \
            libssl-dev libelf-dev libdw-dev aria2 zip unzip \
            gcc-aarch64-linux-gnu

      - name: 下载内核源码
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          if [ "${{ inputs.kernel_version }}" = "6.12.38" ]; then
            aria2c -s16 -x16 -k1M \
              https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip \
              -o common.zip
          else
            aria2c -s16 -x16 -k1M \
              https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip \
              -o common.zip
          fi
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-* common
          rm -f common.zip

      - name: 下载 Clang 19 工具链
        run: |
          cd kernel_workspace
          mkdir -p clang19
          aria2c -s16 -x16 -k1M \
            https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip \
            -o clang.zip
          unzip -q clang.zip -d clang19
          rm -f clang.zip

      - name: Checkout 模块源码
        uses: actions/checkout@v4
        with:
          path: module_src

      - name: 准备内核编译环境
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$PATH"
          cd kernel_workspace/common

          # 6.12 needs Rust config
          echo "CONFIG_RUST=y" >> arch/arm64/configs/gki_defconfig

          make -j$(nproc) LLVM=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld O=out gki_defconfig

          # Disable Rust for our C-only module build
          scripts/config --file out/.config --disable RUST
          make -j$(nproc) LLVM=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld O=out olddefconfig

          make -j$(nproc) LLVM=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld O=out modules_prepare

      - name: 构建 vmlinux 生成符号表
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$PATH"
          cd kernel_workspace/common

          # Build vmlinux to generate Module.symvers / vmlinux.symvers
          # (required for modpost symbol resolution)
          make -j$(nproc) LLVM=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld OBJCOPY=llvm-objcopy O=out vmlinux

      - name: 编译 xbox_ff.ko
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$PATH"

          MODULE_DIR="$WORKDIR/module_build"
          mkdir -p "$MODULE_DIR"

          cp "$WORKDIR/module_src/xbox_ff.c" "$MODULE_DIR/"

          cat > "$MODULE_DIR/Makefile" << 'MAKEFILE_END'
          obj-m := xbox_ff.o
          MAKEFILE_END

          cd kernel_workspace/common
          make -j$(nproc) LLVM=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld O=out \
            M="$MODULE_DIR" modules

      - name: 检查模块
        run: |
          ls -lh module_build/xbox_ff.ko
          echo "=== modinfo ==="
          modinfo module_build/xbox_ff.ko 2>/dev/null || true
          echo "=== ELF info ==="
          readelf -h module_build/xbox_ff.ko 2>/dev/null | head -5 || true
          echo "=== vermagic ==="
          strings module_build/xbox_ff.ko | grep vermagic || true

      - name: 上传 xbox_ff.ko
        uses: actions/upload-artifact@v4
        with:
          name: xbox_ff_${{ inputs.kernel_version }}
          path: module_build/xbox_ff.ko
