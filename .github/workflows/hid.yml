name: 修正版本号并编译 Xbox FF 模块

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  # 这里的后缀必须严格对应你 uname -a 看到的横杠后面的内容
  KERNEL_LOCALVERSION: "-android16-5-ga8f88ad96df3-ab13929693-4k"

jobs:
  build_module:
    runs-on: ubuntu-latest
    steps:
      - name: 安装环境依赖
        run: |
          sudo apt update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev libdw-dev aria2 zip unzip

      - name: 初始化工具链与源码
        run: |
          mkdir -p workspace/module
          cd workspace
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15 common

      - name: 生成源代码
        run: |
          cat << 'EOF' > workspace/module/hid-xbox-ff.c
          #include <linux/module.h>
          #include <linux/hid.h>
          #include <linux/input.h>
          #include <linux/workqueue.h>
          #include <linux/slab.h>

          #define USB_VENDOR_ID_MICROSOFT 0x045E
          #define USB_DEVICE_ID_XBOX_BT   0x0B13
          #define XB1S_FF_REPORT 3
          #define ENABLE_WEAK  BIT(0)
          #define ENABLE_STRONG BIT(1)

          struct xb1s_ff_report { u8 report_id; u8 enable; u8 magnitude[2]; u8 duration; u8 delay; u8 loop; } __packed;
          struct xboxff { struct hid_device *hdev; struct work_struct work; u8 strong; u8 weak; };

          static void xboxff_worker(struct work_struct *work) {
              struct xboxff *x = container_of(work, struct xboxff, work);
              struct xb1s_ff_report r;
              memset(&r, 0, sizeof(r));
              r.report_id = XB1S_FF_REPORT;
              r.enable = ENABLE_STRONG | ENABLE_WEAK;
              r.magnitude[0] = x->strong; r.magnitude[1] = x->weak;
              r.duration = 0xFF; r.loop = 0xFF;
              hid_hw_output_report(x->hdev, (u8 *)&r, sizeof(r));
          }

          static int xboxff_play(struct input_dev *dev, void *data, struct ff_effect *effect) {
              struct xboxff *x = data;
              if (effect->type != FF_RUMBLE) return 0;
              x->strong = effect->u.rumble.strong_magnitude >> 8;
              x->weak   = effect->u.rumble.weak_magnitude >> 8;
              schedule_work(&x->work);
              return 0;
          }

          static int xboxff_probe(struct hid_device *hdev, const struct hid_device_id *id) {
              struct xboxff *x; struct hid_input *hidinput; struct input_dev *input; int ret;
              if ((ret = hid_parse(hdev)) || (ret = hid_hw_start(hdev, HID_CONNECT_DEFAULT))) return ret;
              if (list_empty(&hdev->inputs)) return -ENODEV;
              hidinput = list_first_entry(&hdev->inputs, struct hid_input, list);
              input = hidinput->input;
              if (!(x = devm_kzalloc(&hdev->dev, sizeof(*x), GFP_KERNEL))) return -ENOMEM;
              x->hdev = hdev; INIT_WORK(&x->work, xboxff_worker);
              hid_set_drvdata(hdev, x);
              input_set_capability(input, EV_FF, FF_RUMBLE);
              input_ff_create_memless(input, x, xboxff_play);
              hid_info(hdev, "Xbox FF driver loaded\n");
              return 0;
          }

          static void xboxff_remove(struct hid_device *hdev) {
              struct xboxff *x = hid_get_drvdata(hdev);
              if (x) cancel_work_sync(&x->work);
              hid_hw_stop(hdev);
          }

          static const struct hid_device_id xboxff_ids[] = { { HID_BLUETOOTH_DEVICE(USB_VENDOR_ID_MICROSOFT, USB_DEVICE_ID_XBOX_BT) }, { } };
          MODULE_DEVICE_TABLE(hid, xboxff_ids);
          static struct hid_driver xboxff_driver = { .name = "xboxff", .id_table = xboxff_ids, .probe = xboxff_probe, .remove = xboxff_remove };
          module_hid_driver(xboxff_driver);
          MODULE_LICENSE("GPL");
          EOF
          echo "obj-m += hid-xbox-ff.o" > workspace/module/Makefile

      - name: 编译模块
        run: |
          cd workspace/common
          export PATH="$(pwd)/../clang19/bin:$PATH"
          MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1"

          make $MAKE_ARGS gki_defconfig
          
          # 关键点：强制写入 LOCALVERSION 确保版本号完全匹配
          sed -i 's/CONFIG_LOCALVERSION=""/CONFIG_LOCALVERSION="${{ env.KERNEL_LOCALVERSION }}"/' .config
          # 如果原本没有这一行，则追加
          if ! grep -q "CONFIG_LOCALVERSION=" .config; then
            echo 'CONFIG_LOCALVERSION="${{ env.KERNEL_LOCALVERSION }}"' >> .config
          fi

          make $MAKE_ARGS modules_prepare
          
          # 编译并生成模块
          make $MAKE_ARGS KBUILD_MODPOST_WARN=1 -C $(pwd) M=$(pwd)/../module modules

      - name: 上传模块
        uses: actions/upload-artifact@v4
        with:
          name: hid-xbox-ff-module-v2
          path: workspace/module/hid-xbox-ff.ko
