name: 加速版构建 6.12.23 欧加真OKI内核-带手柄修复

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.12'
  KERNEL_NAME: 'android16-5-ga8f88ad96df3-ab13929693-4k'
  CCACHE_KEY: ccache-neov5-6.12.23

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(resukisu/sukisu/ksunext/ksu/none)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: true
      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 环境准备
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm cpufrequtils
          
      - name: 拉取内核源码与工具链
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          # 拉取主内核源码
          git clone --depth=1 https://github.com/HelloKitty-UI/android_kernel_common_oneplus_sm8850 common
          # 拉取编译脚本与工具 (Clang 19)
          git clone --depth=1 https://github.com/HelloKitty-UI/oppo_oplus_realme_sm8850 build-tools
          # 下载 Clang 19 (模拟原有 build.sh 中的下载逻辑)
          mkdir clang19
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.0/clang+llvm-19.1.0-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          tar -C clang19 --strip-components=1 -xf clang+llvm-19.1.0-x86_64-linux-gnu-ubuntu-22.04.tar.xz

      - name: 修复 Xbox 手柄振动源码 (注入 0b13 ID)
        run: |
          cd kernel_workspace/common
          # 在驱动源码的设备列表中精准插入对 0x0B13 型号的支持
          # 使用 sed 匹配末尾空项并在其上方添加
          sed -i '/{ }/i \	{ HID_BLUETOOTH_DEVICE(USB_VENDOR_ID_MICROSOFT, 0x0B13), .driver_data = MS_QUIRK_FF },' drivers/hid/hid-microsoft.c
          echo ">>> 驱动修改验证："
          grep -B 3 "0x0B13" drivers/hid/hid-microsoft.c

      - name: 配置与编译内核及模块
        run: |
          WORKDIR="$(pwd)"
          cd kernel_workspace/common
          
          # 设置编译器路径
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export LLVM=1 LLVM_IAS=1 ARCH=arm64
          
          # 1. 生成配置文件 (确保版本号干净)
          make O=out vendor/sm8850_defconfig
          find out -name .config -exec sed -i 's/CONFIG_LOCALVERSION_AUTO=y/CONFIG_LOCALVERSION_AUTO=n/g' {} +
          
          # 2. 准备模块构建环境
          make -j$(nproc --all) O=out modules_prepare
          
          # 3. 专门编译针对修复后的 hid-microsoft.ko 模块
          make -j$(nproc --all) O=out M=drivers/hid modules
          
          # 4. 拷贝产物到根目录方便上传
          cp out/drivers/hid/hid-microsoft.ko ../../hid-microsoft-fixed.ko

      - name: 上传修复版驱动模块
        uses: actions/upload-artifact@v4
        with:
          name: Xbox-Vibration-Fix-KO
          path: hid-microsoft-fixed.ko

      # 如果您还需要编译完整的内核包，可以在下方继续保留您原有的 AnyKernel 打包逻辑
