name: 编译 xpadneo (APatch KPM 官方原生链接版)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  KERNEL_LOCALVERSION: "-android16-5-g188c695beb6d-ab14367805-4k"

jobs:
  build_xpadneo_kpm:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装环境依赖
        run: |
          sudo apt update
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            aria2 zip unzip bc dwarves git flex bison clang lld llvm pahole

      - name: 初始化工具链与内核源码
        run: |
          mkdir -p workspace
          cd workspace
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19
          
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15 common

      - name: 读取内核编译缓存
        id: cache-vmlinux
        uses: actions/cache@v4
        with:
          path: |
            workspace/common/vmlinux
            workspace/common/.config
            workspace/common/include
            workspace/common/arch/arm64/include
            workspace/common/scripts
          key: vmlinux-v1-${{ env.KERNEL_LOCALVERSION }}

      - name: 准备驱动源码并编译为 .o 文件
        run: |
          ROOT_DIR=$(pwd)
          KERNEL_DIR=$ROOT_DIR/workspace/common
          
          cd workspace
          [ -d "xpadneo" ] || git clone https://github.com/atar-axis/xpadneo.git
          XPAD_DIR=$KERNEL_DIR/drivers/hid/xpadneo
          mkdir -p $XPAD_DIR
          cp -r xpadneo/hid-xpadneo/src/xpadneo/* $XPAD_DIR/

          # 创建符合 KPM 规范的 entry.c
          # 注意：这里手动定义 KPM 宏，模拟 <kpmodule.h>
          cat << 'EOF' > $XPAD_DIR/kpm_main.c
          #define KPM_INFO(name, value) \
              static const char __kpm_##name[] __attribute__((used, section(".kpm_info"))) = #name "=" value
          
          KPM_NAME("xpadneo");
          KPM_VERSION("0.9.6");
          KPM_LICENSE("GPL v2");
          KPM_AUTHOR("atar-axis");
          KPM_DESCRIPTION("Xbox Controller Driver via APatch");

          extern int xpadneo_init(void);
          extern void xpadneo_exit(void);

          // 模拟 KPM_INIT / KPM_EXIT 的底层实现（根据链接脚本逻辑）
          static long kpm_init_wrapper(const char *args, const char *event, void *res) {
              return (long)xpadneo_init();
          }
          static long kpm_exit_wrapper(void *res) {
              xpadneo_exit();
              return 0;
          }

          // 将函数指针放入 APatch 识别的特定段
          static void* __init_ptr __attribute__((used, section(".kpm_init"))) = kpm_init_wrapper;
          static void* __exit_ptr __attribute__((used, section(".kpm_exit"))) = kpm_exit_wrapper;
          EOF

          # 修改原 core.c 导出初始化函数
          sed -i 's/static int __init xpad_init/int xpadneo_init/g' $XPAD_DIR/core.c
          sed -i 's/static void __exit xpad_exit/void xpadneo_exit/g' $XPAD_DIR/core.c

          # 编译所有 .o 文件 (使用内核的编译参数但只要 .o)
          cd $KERNEL_DIR
          export PATH="$ROOT_DIR/workspace/clang19/bin:$PATH"
          export MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu-"
          
          cat << 'EOF' > $XPAD_DIR/Makefile
          obj-y := kpm_main.o consumer.o core.o debug.o device.o events.o keyboard.o mappings.o mouse.o power.o quirks.o rumble.o synthetic.o
          ccflags-y += -DVERSION=\"0.9.6\" -I$(src)
          EOF

          # 只编译出目标文件，不链接
          make $MAKE_ARGS -j$(nproc) M=drivers/hid/xpadneo modules || true

      - name: 使用 LLVM 链接生成 .kpm
        run: |
          ROOT_DIR=$(pwd)
          XPAD_OBJ_DIR="workspace/common/drivers/hid/xpadneo"
          LD="$ROOT_DIR/workspace/clang19/bin/ld.lld"
          STRIP="$ROOT_DIR/workspace/clang19/bin/llvm-strip"
          
          cd $XPAD_OBJ_DIR
          
          # 执行部分链接 (Relocatable Link)
          # 把所有驱动 .o 文件链接成一个单体
          $LD -r -o xpadneo.kpm \
            kpm_main.o consumer.o core.o debug.o device.o events.o \
            keyboard.o mappings.o mouse.o power.o quirks.o rumble.o synthetic.o
          
          # 清除符号，减小体积
          $STRIP -g --strip-unneeded xpadneo.kpm
          
          cp xpadneo.kpm $ROOT_DIR/workspace/common/
          echo "KPM 链接完成！"

      - name: 提取并上传 KPM
        uses: actions/upload-artifact@v4
        with:
          name: xpadneo-kpm
          path: workspace/common/xpadneo.kpm
