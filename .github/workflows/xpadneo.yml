name: 编译 xpadneo (第二步：利用缓存调试 KPM - 最终路径版)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  KERNEL_LOCALVERSION: "-android16-5-g188c695beb6d-ab14367805-4k"

jobs:
  build_xpadneo_kpm:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装环境依赖
        run: |
          sudo apt update
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            aria2 zip unzip bc dwarves git flex bison clang lld llvm pahole

      - name: 初始化工具链与内核源码
        run: |
          mkdir -p workspace
          cd workspace
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19
          
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15 common

      - name: 读取内核编译缓存
        id: cache-vmlinux
        uses: actions/cache@v4
        with:
          path: |
            workspace/common/vmlinux
            workspace/common/.config
            workspace/common/include
            workspace/common/arch/arm64/include
            workspace/common/scripts
          key: vmlinux-v1-${{ env.KERNEL_LOCALVERSION }}

      - name: 全量编译 (缓存命中则跳过)
        if: steps.cache-vmlinux.outputs.cache-hit != 'true'
        run: |
          cd workspace/common
          export PATH="$(pwd)/../clang19/bin:$PATH"
          export MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu-"
          make $MAKE_ARGS gki_defconfig
          scripts/config --disable CONFIG_DEBUG_INFO_BTF
          scripts/config --disable CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"${{ env.KERNEL_LOCALVERSION }}\"/" .config
          make $MAKE_ARGS -j$(nproc) vmlinux

      - name: 准备驱动源码并编译目标文件
        run: |
          ROOT_DIR=$(pwd)
          KERNEL_DIR=$ROOT_DIR/workspace/common
          CLANG_BIN=$ROOT_DIR/workspace/clang19/bin
          
          cd workspace
          [ -d "xpadneo" ] || git clone https://github.com/atar-axis/xpadneo.git
          
          XPAD_DIR=$KERNEL_DIR/drivers/hid/xpadneo
          mkdir -p $XPAD_DIR
          cp -r xpadneo/hid-xpadneo/src/xpadneo/* $XPAD_DIR/
          
          cd $XPAD_DIR
          # 修改函数签名，确保 KPM 能调用
          sed -i 's/static int __init xpad_init/int xpadneo_init_kpm/g' core.c
          sed -i 's/static void __exit xpad_exit/void xpadneo_exit_kpm/g' core.c
          sed -i 's/defined(CONFIG_XBOX_ONE_BATTERY)/0/g' core.c || true
          
          cat << 'EOF' > Makefile
          XPADNEO_VERSION := "0.9.6"
          ccflags-y += -DVERSION=$(XPADNEO_VERSION)
          obj-m += hid-xpadneo.o
          hid-xpadneo-y := consumer.o core.o debug.o device.o events.o keyboard.o mappings.o mouse.o power.o quirks.o rumble.o synthetic.o
          EOF

          cd $KERNEL_DIR
          export PATH="$CLANG_BIN:$PATH"
          export MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu-"
          
          # 编译驱动 .o 文件，忽略最后的链接错误
          make $MAKE_ARGS -j$(nproc) M=drivers/hid/xpadneo modules || true

      - name: 构建 KPM 补丁
        run: |
          ROOT_DIR=$(pwd)
          KERNEL_DIR=$ROOT_DIR/workspace/common
          cd $KERNEL_DIR
          
          if [ -f "$ROOT_DIR/kptools" ]; then
            cp "$ROOT_DIR/kptools" ./kptools
            chmod +x ./kptools
          else
            echo "错误：未发现 kptools 文件！"
            exit 1
          fi
          
          # 1. 编写“零依赖”Stub 文件
          # 绕过所有内核头文件，直接声明 KPM 接口
          cat << 'EOF' > kpm_stub.c
          typedef int (*init_ptr)(void);
          typedef void (*exit_ptr)(void);

          extern int xpadneo_init_kpm(void);
          extern void xpadneo_exit_kpm(void);

          // KPM 期望的导出符号名
          init_ptr _kpm_init = xpadneo_init_kpm;
          exit_ptr _kpm_exit = xpadneo_exit_kpm;
          EOF
          
          # 2. 极简编译 Stub (无需任何 -I 路径)
          export CLANG_PATH="$ROOT_DIR/workspace/clang19/bin/clang"
          $CLANG_PATH -target aarch64-linux-gnu -O2 -c kpm_stub.c -o kpm_stub.o

          # 3. 合成 KPM
          # 将所有生成的 .o 文件合成最终补丁
          ./kptools kpm build \
            --arch arm64 \
            --vmlinux ./vmlinux \
            --config .config \
            --output xpadneo.kpm \
            drivers/hid/xpadneo/consumer.o \
            drivers/hid/xpadneo/core.o \
            drivers/hid/xpadneo/debug.o \
            drivers/hid/xpadneo/device.o \
            drivers/hid/xpadneo/events.o \
            drivers/hid/xpadneo/keyboard.o \
            drivers/hid/xpadneo/mappings.o \
            drivers/hid/xpadneo/mouse.o \
            drivers/hid/xpadneo/power.o \
            drivers/hid/xpadneo/quirks.o \
            drivers/hid/xpadneo/rumble.o \
            drivers/hid/xpadneo/synthetic.o \
            kpm_stub.o

      - name: 提取并上传 KPM
        uses: actions/upload-artifact@v4
        with:
          name: xpadneo-kpm
          path: workspace/common/xpadneo.kpm
