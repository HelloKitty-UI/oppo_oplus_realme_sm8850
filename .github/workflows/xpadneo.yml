name: 编译 xpadneo (内核缝合对齐版)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  KERNEL_LOCALVERSION: "-android16-5-g188c695beb6d-ab14367805-4k"

jobs:
  build_xpadneo:
    runs-on: ubuntu-latest
    steps:
      - name: 安装环境依赖
        run: |
          sudo apt update
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            aria2 zip unzip bc dwarves git flex bison clang lld llvm

      - name: 初始化工具链与内核源码
        run: |
          mkdir -p workspace
          cd workspace
          # 下载 Clang 19
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19
          # 下载内核源码
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15 common

      - name: 缝合 xpadneo 到内核树
        run: |
          cd workspace
          git clone https://github.com/atar-axis/xpadneo.git
          
          # 1. 在内核驱动目录下创建专用文件夹
          mkdir -p common/drivers/hid/xpadneo_in_tree
          
          # 2. 拷贝源码 (注意路径，我们需要 src 下的代码)
          cp -r xpadneo/hid-xpadneo/src/xpadneo/* common/drivers/hid/xpadneo_in_tree/
          
          # 3. 禁用电池功能 (防止 power_supply 符号干扰)
          sed -i 's/defined(CONFIG_XBOX_ONE_BATTERY)/0/g' common/drivers/hid/xpadneo_in_tree/core.c
          
          # 4. 关键：创建树内 Makefile
          # 这样写会让编译器认为它是内核的“嫡系”
          cat << 'EOF' > common/drivers/hid/xpadneo_in_tree/Makefile
          XPADNEO_VERSION := "0.9.6"
          ccflags-y += -I$(srctree)/drivers/hid/xpadneo_in_tree -DVERSION=$(XPADNEO_VERSION)
          obj-m += hid-xpadneo.o
          hid-xpadneo-y := consumer.o core.o debug.o device.o events.o keyboard.o mappings.o mouse.o power.o quirks.o rumble.o synthetic.o
          EOF

      - name: 执行对齐编译
        run: |
          cd workspace/common
          export PATH="$(pwd)/../clang19/bin:$PATH"
          
          MAKE_ARGS="ARCH=arm64 \
                     CROSS_COMPILE=aarch64-linux-gnu- \
                     LLVM=1 \
                     LLVM_IAS=1 \
                     CLANG_TRIPLE=aarch64-linux-gnu-"

          # 初始化并对齐版本号
          make $MAKE_ARGS gki_defconfig
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"${{ env.KERNEL_LOCALVERSION }}\"/" .config
          
          # 预准备环境
          make $MAKE_ARGS -j$(nproc) modules_prepare
          
          # 核心步骤：编译这个特定的树内文件夹为模块
          # 这次由于在 drivers/hid 路径下，它能自动解析到 hid_hw_start 等函数
          make $MAKE_ARGS -j$(nproc) M=drivers/hid/xpadneo_in_tree modules

      - name: 提取并检查
        run: |
          KO_FILE="workspace/common/drivers/hid/xpadneo_in_tree/hid-xpadneo.ko"
          if [ -f "$KO_FILE" ]; then
            echo "--- 缝合编译成功 ---"
            strings $KO_FILE | grep vermagic
          else
            echo "--- 编译失败 ---"
            exit 1
          fi

      - name: 上传模块
        uses: actions/upload-artifact@v4
        with:
          name: hid-xpadneo-intree
          path: workspace/common/drivers/hid/xpadneo_in_tree/hid-xpadneo.ko
