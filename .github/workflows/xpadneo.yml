name: 编译 xpadneo (官方源码驱动对齐版)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  # 必须与手机 uname -r 后的后缀完全一致
  KERNEL_LOCALVERSION: "-android16-5-g188c695beb6d-ab14367805-4k"

jobs:
  build_xpadneo:
    runs-on: ubuntu-latest
    steps:
      - name: 安装环境依赖
        run: |
          sudo apt update
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            aria2 zip unzip bc dwarves git flex bison clang lld llvm

      - name: 初始化工具链与内核源码
        run: |
          mkdir -p workspace
          cd workspace
          # 下载专用 Clang 19 工具链
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19
          
          # 下载 sm8850 内核源码
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15 common

      - name: 准备 xpadneo 源码并禁用电池功能
        run: |
          cd workspace
          git clone https://github.com/atar-axis/xpadneo.git
          
          # 关键：彻底关闭驱动对电源管理符号的依赖
          # 这能解决之前 dmesg 中 power_supply_powers (err -2) 的报错
          cd xpadneo/hid-xpadneo
          sed -i 's/CONFIG_XBOX_ONE_BATTERY=y/CONFIG_XBOX_ONE_BATTERY=n/g' Kconfig || true
          # 在核心代码中强行关掉电池逻辑
          sed -i 's/#define CONFIG_XBOX_ONE_BATTERY/\/\/#define CONFIG_XBOX_ONE_BATTERY/g' src/xpadneo/core.c || true

      - name: 生成内核环境与符号表
        run: |
          cd workspace/common
          export PATH="$(pwd)/../clang19/bin:$PATH"
          
          MAKE_ARGS="ARCH=arm64 \
                     CROSS_COMPILE=aarch64-linux-gnu- \
                     LLVM=1 \
                     LLVM_IAS=1 \
                     CLANG_TRIPLE=aarch64-linux-gnu-"

          # 初始化并注入版本号
          make $MAKE_ARGS gki_defconfig
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"${{ env.KERNEL_LOCALVERSION }}\"/" .config
          
          # 生成编译驱动必须的脚本、头文件和 Module.symvers
          make $MAKE_ARGS -j$(nproc) scripts
          make $MAKE_ARGS -j$(nproc) prepare
          make $MAKE_ARGS -j$(nproc) modules_prepare

      - name: 编译 xpadneo 模块 (调用官方构建逻辑)
        run: |
          # 进入驱动源代码所在目录
          cd workspace/xpadneo/hid-xpadneo
          export PATH="$(pwd)/../../clang19/bin:$PATH"
          
          # 将内核生成的符号表拷贝过来辅助对齐
          cp ../../common/Module.symvers ./src/Module.symvers || true
          
          # M=$(pwd)/src 是关键，因为驱动的 C 文件都在 src/xpadneo/ 下
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 \
               KBUILD_MODPOST_WARN=1 \
               -C ../../common M=$(pwd)/src modules

      - name: 验证 .ko 生成并导出
        run: |
          # 在 xpadneo 目录下搜索生成的 ko 文件
          KO_FILE=$(find workspace/xpadneo -name "hid-xpadneo.ko" | head -n 1)
          
          if [ -n "$KO_FILE" ] && [ -f "$KO_FILE" ]; then
            echo "--- 驱动生成成功 ---"
            echo "路径: $KO_FILE"
            # 检查驱动的内核版本信息
            strings "$KO_FILE" | grep vermagic
          else
            echo "--- 错误：驱动编译失败，未找到 .ko 文件 ---"
            # 打印目录列表辅助调试
            ls -R workspace/xpadneo
            exit 1
          fi

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hid-xpadneo-official-src-v4
          path: "**/*.ko"
