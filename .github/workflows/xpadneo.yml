name: 编译 xpadneo (安卓 6.1 KPM 官方标准版)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  KERNEL_LOCALVERSION: "-android16-5-g188c695beb6d-ab14367805-4k"

jobs:
  build_kpm:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 初始化环境与缓存
        run: |
          sudo apt update && sudo apt install -y aria2 zip unzip bc dwarves clang lld llvm pahole
          mkdir -p workspace/common
          # 此处省略下载 Clang19 和内核源码的代码，假设你已经有了上一版的逻辑

      - name: 读取内核编译缓存
        uses: actions/cache@v4
        with:
          path: |
            workspace/common/vmlinux
            workspace/common/.config
            workspace/common/include
            workspace/common/arch/arm64/include
          key: vmlinux-v1-${{ env.KERNEL_LOCALVERSION }}

      - name: 注入 KPM 逻辑并编译
        run: |
          ROOT_DIR=$(pwd)
          KERNEL_DIR=$ROOT_DIR/workspace/common
          XPAD_DIR=$KERNEL_DIR/drivers/hid/xpadneo
          
          # 1. 获取 xpadneo 源码
          cd workspace
          git clone https://github.com/atar-axis/xpadneo.git
          mkdir -p $XPAD_DIR
          cp -r xpadneo/hid-xpadneo/src/xpadneo/* $XPAD_DIR/
          
          # 2. 修改核心函数为全局可见
          sed -i 's/static int __init xpad_init/int xpadneo_init/g' $XPAD_DIR/core.c
          sed -i 's/static void __exit xpad_exit/void xpadneo_exit/g' $XPAD_DIR/core.c

          # 3. 创建 KPM 包装文件
          cat << 'EOF' > $XPAD_DIR/kpm_main.c
          #include <linux/module.h>
          // 手动模拟 kpmodule.h 宏，避免头文件缺失
          #define KPM_INFO(name, value) static const char __kpm_##name[] __attribute__((used, section(".kpm_info"))) = #name "=" value
          #define KPM_NAME(val) KPM_INFO(name, val)
          #define KPM_VERSION(val) KPM_INFO(version, val)
          #define KPM_LICENSE(val) KPM_INFO(license, val)
          #define KPM_AUTHOR(val) KPM_INFO(author, val)
          #define KPM_DESCRIPTION(val) KPM_INFO(description, val)
          #define KPM_INIT(func) static void* __init_ptr __attribute__((used, section(".kpm_init"))) = func
          #define KPM_EXIT(func) static void* __exit_ptr __attribute__((used, section(".kpm_exit"))) = func

          KPM_NAME("xpadneo");
          KPM_VERSION("0.9.6");
          KPM_LICENSE("GPL v2");
          KPM_AUTHOR("atar-axis");
          KPM_DESCRIPTION("Xbox Wireless Controller KPM Driver");

          extern int xpadneo_init(void);
          extern void xpadneo_exit(void);

          static long kpm_init_wrapper(const char *a, const char *e, void *r) { return (long)xpadneo_init(); }
          static long kpm_exit_wrapper(void *r) { xpadneo_exit(); return 0; }

          KPM_INIT(kpm_init_wrapper);
          KPM_EXIT(kpm_exit_wrapper);
          EOF

          # 4. 编写 Makefile
          cat << 'EOF' > $XPAD_DIR/Makefile
          obj-y := kpm_main.o consumer.o core.o debug.o device.o events.o keyboard.o mappings.o mouse.o power.o quirks.o rumble.o synthetic.o
          ccflags-y += -DVERSION=\"0.9.6\" -I$(src)
          EOF

          # 5. 编译 .o 文件
          cd $KERNEL_DIR
          export PATH="$ROOT_DIR/workspace/clang19/bin:$PATH"
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 -j$(nproc) M=drivers/hid/xpadneo modules || true

      - name: 链接 KPM 模块
        run: |
          cd workspace/common/drivers/hid/xpadneo
          LD="../../../../clang19/bin/ld.lld"
          STRIP="../../../../clang19/bin/llvm-strip"
          
          # 将所有生成的 .o 链接为单体 kpm
          # 使用 -r (relocatable) 保持可重定位性，这是 KPM 的灵魂
          $LD -r -o xpadneo.kpm kpm_main.o consumer.o core.o debug.o device.o events.o keyboard.o mappings.o mouse.o power.o quirks.o rumble.o synthetic.o
          
          $STRIP -g --strip-unneeded xpadneo.kpm
          mv xpadneo.kpm ../../../xpadneo.kpm

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: xpadneo-kpm
          path: workspace/common/xpadneo.kpm
