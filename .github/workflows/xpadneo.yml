name: 编译 xpadneo 完整驱动 (6.12 GKI 修正版)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  KERNEL_LOCALVERSION: "-android16-5-ga8f88ad96df3-ab13929693-4k"

jobs:
  build_xpadneo:
    runs-on: ubuntu-latest
    steps:
      - name: 安装环境依赖
        run: |
          sudo apt update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev libdw-dev aria2 zip unzip bc dwarves git

      - name: 初始化工具链与内核源码
        run: |
          mkdir -p workspace
          cd workspace
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15 common

      - name: 准备 xpadneo 源码并合并至内核树
        run: |
          cd workspace
          git clone https://github.com/atar-axis/xpadneo.git
          
          # 创建内核树内的模块目录 (为了让 Kbuild 绝对能找到文件)
          mkdir -p common/drivers/hid/xpadneo_mod
          cp -r xpadneo/hid-xpadneo/src/* common/drivers/hid/xpadneo_mod/
          
          # 覆盖生成正确的 Makefile
          # 注意：xpadneo 还需要一些特殊的宏定义来支持高级功能
          cat << 'EOF' > common/drivers/hid/xpadneo_mod/Makefile
          obj-m += hid-xpadneo.o
          hid-xpadneo-y := xpadneo_main.o xpadneo_params.o xpadneo_ff.o
          ccflags-y += -DDEBUG -DXPADNEO_VERSION=\"0.9.6\"
          EOF

      - name: 执行编译
        run: |
          cd workspace/common
          export PATH="$(pwd)/../clang19/bin:$PATH"
          CLANG_PREFIX="$(pwd)/../clang19/bin/"
          
          MAKE_ARGS="ARCH=arm64 \
                     CROSS_COMPILE=aarch64-linux-gnu- \
                     LLVM=1 \
                     LLVM_IAS=1 \
                     CLANG_TRIPLE=aarch64-linux-gnu- \
                     LD=${CLANG_PREFIX}ld.lld \
                     AR=${CLANG_PREFIX}llvm-ar \
                     NM=${CLANG_PREFIX}llvm-nm \
                     OBJCOPY=${CLANG_PREFIX}llvm-objcopy \
                     OBJDUMP=${CLANG_PREFIX}llvm-objdump \
                     STRIP=${CLANG_PREFIX}llvm-strip"

          # 配置内核
          make $MAKE_ARGS gki_defconfig
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="${{ env.KERNEL_LOCALVERSION }}"/' .config
          
          # 准备编译环境
          make $MAKE_ARGS modules_prepare
          
          # 编译模块 (这次直接指向内核目录内的文件夹)
          make $MAKE_ARGS -C $(pwd) M=drivers/hid/xpadneo_mod modules

      - name: 检查并上传模块
        run: |
          KO_FILE="workspace/common/drivers/hid/xpadneo_mod/hid-xpadneo.ko"
          if [ -f "$KO_FILE" ]; then
            echo "--- 编译成功 ---"
            ls -l $KO_FILE
            strings $KO_FILE | grep vermagic
          else
            echo "错误：未生成 hid-xpadneo.ko"
            exit 1
          fi

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hid-xpadneo-6.12-fixed
          path: workspace/common/drivers/hid/xpadneo_mod/hid-xpadneo.ko
